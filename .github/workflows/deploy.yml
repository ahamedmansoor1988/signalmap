name: Deploy to Vercel Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel and alias
        run: |
          DEPLOY_URL=$(npx vercel --prod --yes --token=${{ secrets.VERCEL_TOKEN }})
          echo "Deployed to: $DEPLOY_URL"
          npx vercel alias "$DEPLOY_URL" signalmap-sigma.vercel.app --token=${{ secrets.VERCEL_TOKEN }}
          echo "✅ Aliased to signalmap-sigma.vercel.app"
        env:
          VERCEL_ORG_ID: team_LAqUf1fYOVYUt2tI9O7HIcFP
          VERCEL_PROJECT_ID: prj_vdvS3NTrww7aR6Chywn90ALsXh3H
